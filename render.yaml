services:
  - type: web
    name: healthcare-access-dashboard
    runtime: python
    buildCommand: pip install -r requirements_deploy.txt
    startCommand: gunicorn --workers 1 --threads 2 --timeout 120 -b 0.0.0.0:$PORT dashboard.app:server
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
